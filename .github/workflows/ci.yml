name: scenario-ci

# Runs the scenario-engine test suite and the assumption source_url gate on
# every push/PR that touches the backend. Added by the wiring work; the design
# doc requires a CI gate that blocks empty source_url fields (§7.2, §26).

on:
  push:
    paths:
      - "src/backend/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "src/backend/**"
      - ".github/workflows/ci.yml"

jobs:
  backend-scenario:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install scenario-engine dependencies
        run: |
          python -m pip install --upgrade pip
          pip install langgraph duckdb fastapi "sse-starlette" httpx pytest fpdf2 pydantic h3

      - name: Assumption source_url gate (blocks empty sources)
        run: PYTHONPATH=. python scripts/check_assumption_sources.py

      - name: Scenario golden-path + endpoint tests
        run: PYTHONPATH=. python -m pytest tests_scenario -q
