name: ci

# Runs the backend test suite (scenario + chatbot) and the assumption
# source_url gate, plus a frontend type-check/build, on every push/PR that
# touches the app. The design doc requires a CI gate that blocks empty
# source_url fields (§7.2, §26).

on:
  push:
    paths:
      - "src/backend/**"
      - "src/frontend/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "src/backend/**"
      - "src/frontend/**"
      - ".github/workflows/ci.yml"

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (project + dev group)
        run: |
          python -m pip install --upgrade pip
          pip install -e . --group dev

      - name: Assumption source_url gate (blocks empty sources)
        run: PYTHONPATH=. python scripts/check_assumption_sources.py

      - name: Tests (scenario + chatbot)
        run: PYTHONPATH=. python -m pytest tests_scenario tests_chatbot -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check + build (vue-tsc -b && vite build)
        run: npm run build
